<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apply-enabled jobs</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="shell sidepanel-shell">
      <header class="topbar">
        <div>
          <h1>Apply-enabled jobs</h1>
          <p id="status">Reading results.</p>
        </div>
        <button id="refresh" type="button">Refresh</button>
      </header>

      <section id="posting-picker" class="posting-picker">
        <div class="posting-picker-header">
          <div>
            <h2 id="posting-picker-title">Apply-enabled postings</h2>
            <p id="posting-summary">0 apply-enabled postings</p>
          </div>
          <div class="posting-header-actions">
            <button id="posting-next-page" type="button">Next page</button>
            <button id="posting-select-all" type="button" disabled>Select all</button>
          </div>
        </div>
        <div id="posting-list" class="posting-list"></div>
        <div class="posting-actions">
          <button id="posting-open-selected" class="primary" type="button" disabled>Open selected</button>
          <p id="posting-status" class="meta-status"></p>
        </div>
      </section>

      <section id="cover-letter-runs" class="cover-letter-runs" hidden>
        <div class="cover-letter-runs-header">
          <div>
            <h2>Cover letter PDFs</h2>
            <p id="cover-letter-summary">No active PDFs</p>
          </div>
        </div>
        <div id="cover-letter-list" class="cover-letter-list"></div>
      </section>
    </main>
    <script src="ui/content_scripts.js"></script>
    <script src="ui/posting_picker.js"></script>
    <script src="ui/cover_letter_runs.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
