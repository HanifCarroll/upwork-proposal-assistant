<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dice Easy Apply</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="shell sidepanel-shell">
      <header class="topbar">
        <div>
          <h1>Dice Easy Apply</h1>
          <p id="status">Reading Dice results.</p>
        </div>
        <button id="refresh" type="button">Refresh</button>
      </header>

      <section id="dice-posting-picker" class="posting-picker">
        <div class="posting-picker-header">
          <div>
            <h2>Easy Apply postings</h2>
            <p id="dice-posting-summary">0 Easy Apply</p>
          </div>
          <div class="posting-header-actions">
            <button id="dice-posting-next-page" type="button">Next page</button>
            <button id="dice-posting-select-all" type="button" disabled>Select all</button>
          </div>
        </div>
        <div id="dice-posting-list" class="posting-list"></div>
        <div class="posting-actions">
          <button id="dice-posting-open-selected" class="primary" type="button" disabled>Open Easy Apply</button>
          <p id="dice-posting-status" class="meta-status"></p>
        </div>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
